[project]
name = "users-api"
version = "0.1.0"
description = "Users API - user management module (FastAPI modular monolith)"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "sqlalchemy[asyncio]>=2.0.30",
    "asyncpg>=0.29",
    "alembic>=1.13",
    "pydantic[email]>=2.7",
    "pydantic-settings>=2.3",
    "pyjwt>=2.8",
    "pwdlib[argon2]>=0.2",
    "celery[redis]>=5.4",
]

[dependency-groups]
dev = [
    "pytest>=8.2",
    "pytest-asyncio>=0.24",
    "httpx>=0.27",
    "ruff>=0.6",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.per-file-ignores]
# Test configuration must set the signing key before importing the application.
"tests/conftest.py" = ["E402"]
# Role must inherit `str` (not enum.StrEnum) for SQLAlchemy's Enum(..) column type support.
"app/modules/users/models.py" = ["UP042"]
# Alembic-generated files: imports after `config = context.config`, legacy
# typing.Union/Sequence style, and long auto-generated column definitions.
"alembic/*" = ["E402", "I001", "UP", "E501"]
